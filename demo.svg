    <text y="288" class="section">  TOP TARGETS</text>

    <!-- Target 1 -->
    <text y="318">  1. &#x1F5A5;&#xFE0F; <tspan class="bold">self-host-agent-vm</tspan> (VM)                            <tspan class="cyan bold">STOP</tspan></text>
    <text y="336">     &#9500;&#9472; <tspan class="dim">SIGNALS:</tspan>  CPU 0.3% avg (14d) &#183; Net silent &#183; Disk silent</text>
    <text y="354">     &#9500;&#9472; <tspan class="dim">BLAST:  </tspan>  <tspan class="green">No incoming dependencies. Safe to act.</tspan></text>
    <text y="372">     &#9492;&#9472; <tspan class="dim">SAVING: </tspan>  <tspan class="green-bold">$70.08/mo</tspan>  <tspan class="dim">($2.34/day burning idle)</tspan></text>

    <!-- Target 2 -->
    <text y="402">  2. &#x1F310; <tspan class="bold">12 public IPs</tspan>                                 <tspan class="cyan bold">DEALLOCATE</tspan></text>
    <text y="420">     &#9500;&#9472; <tspan class="dim">PATTERN:</tspan>  All from NAT gateways &#8212; leftover from deployments</text>
    <text y="438">     &#9500;&#9472; <tspan class="dim">BLAST:  </tspan>  <tspan class="green">Already disconnected. No downstream impact.</tspan></text>
    <text y="456">     &#9492;&#9472; <tspan class="dim">SAVING: </tspan>  <tspan class="green-bold">$43.80/mo</tspan>  <tspan class="dim">($1.46/day wasted)</tspan></text>

    <!-- Target 3 -->
    <text y="486">  3. &#x1F4BE; <tspan class="bold">self-host-agent-OsDisk...</tspan> (Disk)               <tspan class="cyan bold">DELETE</tspan></text>
    <text y="504">     &#9500;&#9472; <tspan class="dim">SIGNALS:</tspan>  Disk not attached to any VM &#8212; generating idle cost</text>
    <text y="522">     &#9500;&#9472; <tspan class="dim">BLAST:  </tspan>  <tspan class="green">No incoming dependencies. Safe to act.</tspan></text>
    <text y="540">     &#9492;&#9472; <tspan class="dim">SAVING: </tspan>  <tspan class="green-bold">$2.25/mo</tspan></text>

    <!-- INSIGHT -->
    <text y="570" class="section">  INFRAMIND INSIGHT</text>
    <text y="588">  <tspan class="bold">77%</tspan> of your waste comes from <tspan class="cyan bold">public IPs</tspan> &#8212; your cleanup</text>
    <text y="606">  process has a gap. A CI/CD post-deploy hook would eliminate this.</text>

    <!-- NEXT -->
    <text y="636" class="dim">  &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;</text>
    <text y="654">  <tspan class="section">NEXT</tspan>  <tspan class="cyan">inframind simulate --dry-run</tspan> <tspan class="dim">preview the full action plan</tspan></text>
  </g>
</svg>
