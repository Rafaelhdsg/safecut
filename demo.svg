    <text y="48"><tspan class="dim">  [GRAPH]    </tspan>  Building dependency tree............. <tspan class="green">Done.</tspan> <tspan class="cyan">All nodes isolated</tspan></text>
    <text y="66"><tspan class="dim">  [ENGINE]   </tspan>  Analyzing 14-day telemetry signals.. <tspan class="green">Done.</tspan> <tspan class="cyan">14 idle detected</tspan></text>
    <text y="84"><tspan class="dim">  [SAFETY]   </tspan>  Simulating blast radius............. <tspan class="green">Done.</tspan> <tspan class="cyan">0 risks found</tspan></text>
    <text y="102"><tspan class="dim">  [FORECAST] </tspan>  Projecting 12-month savings......... <tspan class="green">Done.</tspan> <tspan class="cyan">$1,875/yr recoverable</tspan></text>
    <text y="120" class="dim">  &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;</text>

    <!-- Executive Dashboard -->
    <text y="150" class="dim">  +----------------------------------------------------------+</text>
    <text y="168">  |  <tspan class="cyan bold">INFRAMIND</tspan>  |  <tspan class="bold">RECOVERABLE WASTE FOUND</tspan>                   |</text>
    <text y="186" class="dim">  +----------------------------------------------------------+</text>
    <text y="204">  |  <tspan class="bold">ANNUAL SAVINGS</tspan>    <tspan class="green-bold">$1,875 / yr</tspan>                          |</text>
    <text y="222">  |  <tspan class="bold">SAFETY SCORE</tspan>      <tspan class="green-bold">14/14 safe</tspan>  <tspan class="cyan">[HIGH CONFIDENCE]</tspan>    |</text>
    <text y="240">  |  <tspan class="bold">AUTO-EXECUTE</tspan>      14 actions ready to automate           |</text>
