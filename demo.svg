<svg xmlns="http://www.w3.org/2000/svg" width="820" height="740" viewBox="0 0 820 740">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .bar { fill: #161b22; }
      .border { fill: none; stroke: #30363d; stroke-width: 1; }
      text { font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'SF Mono', 'Menlo', 'Consolas', monospace; font-size: 13px; fill: #e6edf3; }
      .cyan { fill: #22d3ee; }
      .green { fill: #34d399; }
      .green-bold { fill: #34d399; font-weight: 700; }
      .red { fill: #f87171; }
      .yellow { fill: #fbbf24; }
      .dim { fill: #64748b; }
      .bold { font-weight: 700; }
      .title { font-size: 11px; fill: #64748b; }
      .section { fill: #e6edf3; font-weight: 700; }
      .dot-r { fill: #ff5f57; }
      .dot-y { fill: #febc2e; }
      .dot-g { fill: #28c840; }
      .box { fill: none; stroke: #30363d; stroke-width: 1; }
    </style>
  </defs>

  <!-- Window -->
  <rect class="bg" x="0" y="0" width="820" height="740" rx="12"/>
  <rect class="border" x="0" y="0" width="820" height="740" rx="12"/>

  <!-- Title bar -->
  <rect class="bar" x="1" y="1" width="818" height="40" rx="12"/>
  <rect class="bg" x="1" y="30" width="818" height="12"/>
  <line x1="1" y1="41" x2="819" y2="41" stroke="#30363d" stroke-width="1"/>
