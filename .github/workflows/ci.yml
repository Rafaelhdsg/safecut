name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"
          cache-dependency-path: go.sum

      - name: Verify module
        run: go mod verify

      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [[ -n "$unformatted" ]]; then
            echo "The following files are not gofmt-clean:" >&2
            echo "$unformatted" >&2
            echo "Run 'gofmt -w .' and commit the result." >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build -o /dev/null ./cmd/safecut

      - name: Test
        run: go test -race -count=1 ./...

  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

  install-sh-shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck install.sh
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck install.sh scripts/smoke.sh
