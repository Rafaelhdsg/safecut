version: 2

project_name: safecut

before:
  hooks:
    - go mod tidy

builds:
  - id: safecut
    main: ./cmd/safecut
    binary: safecut
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Rafaelhdsg/safecut/internal/version.Version={{.Version}}
      - -X github.com/Rafaelhdsg/safecut/internal/version.Commit={{.ShortCommit}}
      - -X github.com/Rafaelhdsg/safecut/internal/version.Date={{.Date}}
      - -X github.com/Rafaelhdsg/safecut/internal/telemetry.embeddedPostHogKey={{.Env.SAFECUT_POSTHOG_KEY}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

# Homebrew tap: publishes a Cask (GoReleaser v2.16+; `brews` is deprecated).
# Requires Rafaelhdsg/homebrew-tap public and HOMEBREW_TAP_TOKEN secret.
homebrew_casks:
  - name: safecut
    repository:
      owner: Rafaelhdsg
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/Rafaelhdsg/safecut"
    description: "The cuts you'd defend at standup — find idle resources, simulate safely, and stop paying for what you don't use"
    license: "MIT"
    binaries:
      - safecut
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/safecut"]
          end

release:
  github:
    owner: Rafaelhdsg
    name: safecut
  draft: false
  prerelease: auto
  # When a previous run half-succeeded (e.g. the tap step failed after
  # the archives were already uploaded) a re-run would otherwise abort
  # with `422 already_exists` on every asset. With this flag GoReleaser
  # detects the 422, deletes the stale asset, and retries the upload,
  # making re-runs of the same tag idempotent.
  replace_existing_artifacts: true
  name_template: "SafeCut v{{ .Version }}"
  header: |
    ## What's New

    Run `safecut quick-scan` to see instant savings potential.
  footer: |
    ## Install

    ```bash
    # Homebrew
    brew install Rafaelhdsg/tap/safecut

    # curl (Linux/macOS)
    curl -fsSL https://raw.githubusercontent.com/Rafaelhdsg/safecut/main/install.sh | bash

    # Go
    go install github.com/Rafaelhdsg/safecut/cmd/safecut@latest
    ```
