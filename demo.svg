  <circle class="dot-y" cx="40" cy="21" r="6"/>
  <circle class="dot-g" cx="60" cy="21" r="6"/>
  <text class="title" x="410" y="25" text-anchor="middle">~/ &#8212; inframind</text>

  <!-- Terminal content -->
  <g transform="translate(24, 70)">
    <!-- Prompt -->
    <text y="0"><tspan class="cyan">$</tspan> <tspan class="bold">inframind quick-scan</tspan></text>

    <!-- Pipeline Stages -->
